<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Predictor - User</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0d1321; color: #fff; }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }
    .card { background: #1d2d44; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    input, select, button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: none; }
    button { background: #3e5c76; color: white; cursor: pointer; }
    .muted { color: #c0d6df; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏏 IPL Prediction (User)</h1>

    <div class="card">
      <h3>User Login</h3>
      <input id="name" placeholder="Enter your name" />
      <button onclick="login()">Continue</button>
      <p id="userState" class="muted"></p>
    </div>

    <div class="card">
      <h3>Prediction Phase</h3>
      <select id="matchSelect"></select>

      <label>Toss Winner</label>
      <select id="tossWinner"></select>

      <label>Match Winner</label>
      <select id="matchWinner"></select>

      <label>Man of the Match</label>
      <select id="motm"></select>

      <label>Highest Run Scorer</label>
      <select id="highestRuns"></select>

      <label>Highest Wicket Taker</label>
      <select id="mostWickets"></select>

      <label>Predicted Team 1 Score</label>
      <input id="team1Score" type="number" min="0" />

      <label>Predicted Team 2 Score</label>
      <input id="team2Score" type="number" min="0" />

      <button onclick="submitPrediction()">Submit Prediction</button>
      <p id="predictMsg" class="muted"></p>
      <p id="predictState" class="muted"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
